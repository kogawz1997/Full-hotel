name: ci

on:
  pull_request:
  push:
    branches: [ main, master, work ]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run type-check
      - run: npm run test:core-ops
