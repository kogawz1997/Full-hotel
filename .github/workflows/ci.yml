name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Security audit
        run: node scripts/security-audit.mjs

      - name: Dependency vulnerability scan
        run: npm audit --audit-level=high
        continue-on-error: true  # Don't block on low-severity

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality
    env:
      # Minimal env for build
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiJ9.placeholder
      NEXT_PUBLIC_APP_URL: https://placeholder.com
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check build output
        run: |
          if [ ! -d ".next" ]; then
            echo "Build failed — .next directory not found"
            exit 1
          fi
          echo "✅ Build successful"

  migration-check:
    name: Migration Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check migration files
        run: |
          # Verify migration files are numbered sequentially
          ls supabase/migrations/*.sql | sort -V
          echo "✅ Migrations look sequential"

          # Check for dangerous SQL in migrations
          if grep -r "DROP TABLE\|TRUNCATE\|DELETE FROM" supabase/migrations/; then
            echo "⚠️  Destructive SQL found in migrations — review carefully"
          fi

  preview-deploy:
    name: Preview Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel Preview
        run: echo "Vercel auto-deploys previews via GitHub integration"
        # Vercel GitHub integration handles this automatically
        # No manual step needed if connected
