name: Deploy Check

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Type check
        run: npm run type-check

      - name: Static deploy target check
        run: npm run deploy:check

      - name: Build
        run: npm run build
